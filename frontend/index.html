<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0F" />
    <meta name="description" content="Nexa — AI support dashboard for WhatsApp." />

    <script>
      (function () {
        var isOperator = window.location.pathname.indexOf('/onboarding') === 0;
        var manifest = document.createElement('link');
        manifest.rel = 'manifest';
        manifest.href = isOperator ? '/nexus-manifest.webmanifest' : '/manifest.webmanifest';
        document.head.appendChild(manifest);

        window.__nexaInstallPrompt = null;
        window.addEventListener('beforeinstallprompt', function (event) {
          event.preventDefault();
          window.__nexaInstallPrompt = event;
          window.dispatchEvent(new Event('nexa-install-prompt-ready'));
        });
      })();
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nexa" />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>Nexa</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
