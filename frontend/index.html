<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0A0A0F" />
    <meta name="description" content="Nexa — AI support dashboard for WhatsApp." />

    <script>
      (function () {
        var isOperator = window.location.pathname.indexOf('/onboarding') === 0;
        var isExpressNet = /express/i.test(window.location.hostname);
        var manifest = document.createElement('link');
        manifest.rel = 'manifest';
        manifest.href = isOperator ? '/nexus-manifest.webmanifest' : (isExpressNet ? '/expressnet-manifest.webmanifest' : '/manifest.webmanifest');
        document.head.appendChild(manifest);

        if (isExpressNet && !isOperator) {
          document.title = 'ExpressNet Agent';
          var appleTitle = document.querySelector('meta[name="apple-mobile-web-app-title"]');
          if (appleTitle) appleTitle.setAttribute('content', 'ExpressNet');
          [
            ['icon', '/expressnet-favicon-32x32.png', 'image/png', '32x32'],
            ['icon', '/expressnet-favicon-16x16.png', 'image/png', '16x16'],
            ['apple-touch-icon', '/expressnet-apple-touch-icon.png', null, null]
          ].forEach(function (item) {
            var link = document.createElement('link');
            link.rel = item[0];
            link.href = item[1];
            if (item[2]) link.type = item[2];
            if (item[3]) link.sizes = item[3];
            document.head.appendChild(link);
          });
        }

        window.__nexaInstallPrompt = null;
        window.addEventListener('beforeinstallprompt', function (event) {
          event.preventDefault();
          window.__nexaInstallPrompt = event;
          window.dispatchEvent(new Event('nexa-install-prompt-ready'));
        });
      })();
    </script>

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Nexa" />
    <meta name="mobile-web-app-capable" content="yes" />

    <title>Nexa</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
